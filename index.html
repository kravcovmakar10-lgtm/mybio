<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мой Telegram Канал</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            color: white;
        }

        /* Видеофон */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            pointer-events: none;
        }
        
        /* Затемнение */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            z-index: -1;
        }

        /* Контент */
        .content {
            text-align: center;
            padding: 40px 30px;
            max-width: 400px;
            width: 90%;
            z-index: 1;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* ===== КРАСНАЯ КНОПКА С ПОДСВЕТКОЙ ===== */
        .telegram-button {
            display: inline-block;
            background: linear-gradient(135deg, #ff1a1a, #cc0000);
            color: white;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 60px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            
            /* Тень для объёма */
            box-shadow: 0 8px 25px rgba(255, 0, 0, 0.4);
            
            /* Анимация пульсации (подсветка) */
            animation: pulse 1.5s infinite;
        }
        
        /* Эффект при наведении (на компьютере) */
        .telegram-button:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 35px rgba(255, 0, 0, 0.6);
        }
        
        /* Эффект при нажатии */
        .telegram-button:active {
            transform: scale(0.98);
        }
        
        /* Ключевые кадры для анимированной подсветки */
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 0 20px rgba(255, 0, 0, 0);
                transform: scale(1.02);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 0, 0, 0);
                transform: scale(1);
            }
        }
        
        /* Дополнительный эффект — бегущий свет по краю */
        .telegram-button {
            position: relative;
            overflow: hidden;
        }
        
        .telegram-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }
        
        .telegram-button:hover::before {
            left: 100%;
        }
        
        /* Небольшой значок Telegram */
        .telegram-icon {
            margin-right: 12px;
            font-size: 28px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <!-- Видеофон из Pinterest -->
    <video class="video-background" autoplay muted loop playsinline>
        <source src="https://v1.pinimg.com/videos/iht/hls/06/5c/45/065c451bcdd034db58e488faffdd6a6a.m3u8" type="application/x-mpegURL">
    </video>
    
    <div class="overlay"></div>

    <div class="content">
        <h1>🚀 Добро пожаловать!</h1>
        
        <!-- Кнопка с ссылкой на Telegram канал -->
        <a href="https://t.me/+mOLTH5y6clpkZjZi" target="_blank" class="telegram-button" onclick="tg.sendData('Кнопка нажата, переход в канал')">
            <span class="telegram-icon">📢</span>
            МОЙ TELEGRAM КАНАЛ
        </a>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем приложение на весь экран
    </script>
</body>
</html>
