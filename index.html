<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BIO rviax</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            color: white;
        }

        /* Видеофон */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            pointer-events: none;
        }
        
        /* Затемнение */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            z-index: -1;
        }

        /* Контент */
        .content {
            text-align: center;
            padding: 40px 30px;
            max-width: 500px;
            width: 90%;
            z-index: 1;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 40px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* ===== ПРОЗРАЧНАЯ КНОПКА С АНИМИРОВАННОЙ ОБВОДКОЙ ===== */
        .telegram-button {
            display: inline-block;
            background: transparent;  /* Прозрачный фон */
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            padding: 10px 24px;  /* Компактно по размеру текста */
            border-radius: 50px;
            border: 2px solid #ff3333;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            
            /* Текст в одну строку */
            white-space: nowrap;
        }
        
        /* Анимация движущейся красной обводки */
        .telegram-button::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50px;
            background: linear-gradient(90deg, #ff0000, #ff6666, #ff0000, #ff6666, #ff0000);
            background-size: 300% 100%;
            z-index: -1;
            animation: borderMove 2s linear infinite;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        /* Белая полоска, бегущая сверху вниз */
        .telegram-button::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                rgba(255,255,255,0) 0%, 
                rgba(255,255,255,0.6) 50%, 
                rgba(255,255,255,0) 100%);
            transition: top 0.6s ease;
        }
        
        /* При наведении включается обводка и бежит полоска */
        .telegram-button:hover::before {
            opacity: 1;
        }
        
        .telegram-button:hover::after {
            top: 100%;
        }
        
        /* Постоянная анимация обводки (всегда активна) */
        .telegram-button {
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.5);
            animation: glowPulse 1.5s infinite;
        }
        
        /* Анимация пульсации свечения */
        @keyframes glowPulse {
            0% {
                box-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
                border-color: #ff3333;
            }
            50% {
                box-shadow: 0 0 15px rgba(255, 0, 0, 0.9);
                border-color: #ff6666;
            }
            100% {
                box-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
                border-color: #ff3333;
            }
        }
        
        /* Анимация движущейся обводки (бегущий огонёк по контуру) */
        @keyframes borderMove {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 300% 0%;
            }
        }
        
        /* Эффект нажатия */
        .telegram-button:active {
            transform: scale(0.96);
        }
        
        /* Иконка Telegram рядом с текстом */
        .telegram-icon {
            margin-right: 8px;
            font-size: 18px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <!-- Видеофон из Pinterest -->
    <video class="video-background" autoplay muted loop playsinline>
        <source src="https://v1.pinimg.com/videos/iht/hls/06/5c/45/065c451bcdd034db58e488faffdd6a6a.m3u8" type="application/x-mpegURL">
    </video>
    
    <div class="overlay"></div>

    <div class="content">
        <h1> bio rviax</h1>
        
        <!-- Прозрачная кнопка -->
        <a href="https://t.me/+mOLTH5y6clpkZjZi" target="_blank" class="telegram-button" onclick="tg.sendData('Переход в Telegram канал')">
            <span class="telegram-icon">📢</span>
            МОЙ TELEGRAM КАНАЛ
        </a>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
    </script>
</body>
</html>
