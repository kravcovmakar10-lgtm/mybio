<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>rviax | Telegram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Видеофон */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            pointer-events: none;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            z-index: -1;
        }

        .section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .content {
            text-align: center;
            width: 100%;
            z-index: 1;
        }

        .language-switch {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 50px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        
        .lang-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: monospace;
            letter-spacing: 0.5px;
        }
        
        .lang-btn.active {
            color: white;
            background: rgba(255, 51, 51, 0.3);
            border: 1px solid #ff3333;
        }
        
        .lang-btn:hover:not(.active) {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .lang-divider {
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            line-height: 28px;
        }

        .telegram-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: transparent;
            color: white;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            padding: 12px 28px;
            border: 1.5px solid #ff3333;
            border-radius: 40px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            margin-bottom: 40px;
        }
        
        .telegram-button:hover {
            border-color: #ff6666;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4);
            transform: translateY(-1px);
        }
        
        .telegram-button:active {
            transform: translateY(1px);
        }
        
        .telegram-button {
            animation: redPulse 2s infinite;
        }
        
        @keyframes redPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.4);
                border-color: #ff3333;
            }
            50% {
                box-shadow: 0 0 0 8px rgba(255, 51, 51, 0);
                border-color: #ff6666;
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 51, 51, 0);
                border-color: #ff3333;
            }
        }
        
        .telegram-button::before {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                rgba(255, 255, 255, 0) 0%, 
                rgba(255, 255, 255, 0.4) 50%, 
                rgba(255, 255, 255, 0) 100%);
            transition: top 0.5s ease;
        }
        
        .telegram-button:hover::before {
            top: 100%;
        }
        
        .telegram-button::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 42px;
            background: linear-gradient(90deg, 
                #ff0000, #ff6666, #ff0000, #ff6666, #ff0000);
            background-size: 300% 100%;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .telegram-button:hover::after {
            opacity: 0.5;
            animation: borderMove 1.5s linear infinite;
        }
        
        @keyframes borderMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 300% 0%; }
        }
        
        .telegram-icon {
            font-size: 18px;
        }
        
        .about-section {
            margin-bottom: 30px;
        }
        
        .about-title {
            font-size: 20px;
            font-weight: bold;
            color: white;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        
        .profile {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .name {
            font-size: 28px;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
        }
        
        .title {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 16px;
        }
        
        .bio {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            max-width: 280px;
            margin: 0 auto;
            line-height: 1.5;
        }
        
        .learn-more {
            display: inline-block;
            margin-top: 16px;
            color: #ff6666;
            text-decoration: none;
            font-size: 14px;
            border-bottom: 1px solid #ff6666;
            padding-bottom: 2px;
        }
        
        .learn-more:hover {
            color: #ff9999;
        }

        .scroll-down, .scroll-up {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            animation: bounce 2s infinite;
            z-index: 10;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .scroll-down:hover, .scroll-up:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-50%) scale(1.1);
        }
        
        .scroll-down svg, .scroll-up svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
        
        .scroll-up svg {
            transform: rotate(180deg);
        }
        
        @keyframes bounce {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(10px);
            }
        }

        .second-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            position: relative;
        }
        
        .info-card {
            max-width: 320px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 30px;
        }
        
        .info-text {
            font-size: 18px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            font-weight: 400;
        }
        
        .info-text strong {
            color: #ff6666;
            font-weight: 600;
        }
        
        /* Стили для картинки */
        .info-image {
            max-width: 280px;
            width: 100%;
            border-radius: 16px;
            margin-top: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <!-- НОВЫЙ ВИДЕОФОН ИЗ PINTEREST -->
    <video class="video-background" autoplay muted loop playsinline>
        <source src="https://v1.pinimg.com/videos/iht/hls/ac/25/01/ac2501252cfd9aace2a1665078a09136.m3u8" type="application/x-mpegURL">
    </video>
    
    <div class="overlay"></div>

    <!-- ПЕРВАЯ СТРАНИЦА -->
    <div id="page1" class="section">
        <div class="content">
            
            <div class="language-switch">
                <button class="lang-btn active" data-lang="ru">RU</button>
                <span class="lang-divider">|</span>
                <button class="lang-btn" data-lang="en">EN</button>
                <span class="lang-divider">|</span>
                <button class="lang-btn" data-lang="jp">JP</button>
            </div>
            
            <a href="https://t.me/+mOLTH5y6clpkZjZi" target="_blank" class="telegram-button">
                <span class="telegram-icon">📢</span>
                <span id="buttonText">МОЙ TELEGRAM КАНАЛ</span>
            </a>
            
            <div class="about-section">
                <div class="about-title" id="aboutTitle">ОБО МНЕ</div>
            </div>
            
            <div class="profile">
                <div class="name" id="name">rviax</div>
                <div class="title" id="title">Разработчик и Контент-Предприниматель</div>
                <div class="bio" id="bio">Начинающий разработчик и контент-предприниматель. Моя биография на этом сайте.</div>
                <a href="#" class="learn-more" id="learnMore">УЗНАТЬ БОЛЬШЕ</a>
            </div>
        </div>
        
        <div class="scroll-down" onclick="document.getElementById('page2').scrollIntoView({ behavior: 'smooth', block: 'start' })">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 16L6 10L7.4 8.6L12 13.2L16.6 8.6L18 10L12 16Z"/>
            </svg>
        </div>
    </div>

    <!-- ВТОРАЯ СТРАНИЦА -->
    <div id="page2" class="second-page">
        <div class="info-card">
            <div class="info-text" id="infoText">
                <strong>МНЕ 16 ЛЕТ</strong><br><br>
                Я являюсь начинающим разработчиком, имею канал в котором можно зарабатывать онлайн на написание отзывов.
            </div>
            
            <!-- ДОБАВЛЕННАЯ КАРТИНКА ИЗ PINTEREST -->
            <img class="info-image" src="https://i.pinimg.com/originals/6f/b7/91/6fb791d40eddb53a58f9cd8dc9aee694.jpg" alt="Картинка канала">
        </div>
        
        <div class="scroll-up" onclick="document.getElementById('page1').scrollIntoView({ behavior: 'smooth', block: 'start' })">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 16L6 10L7.4 8.6L12 13.2L16.6 8.6L18 10L12 16Z"/>
            </svg>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const translations = {
            ru: {
                name: 'rviax',
                title: 'Разработчик и Контент-Предприниматель',
                bio: 'Начинающий разработчик и контент-предприниматель. Моя биография на этом сайте.',
                learnMore: 'УЗНАТЬ БОЛЬШЕ',
                aboutTitle: 'ОБО МНЕ',
                buttonText: 'МОЙ TELEGRAM КАНАЛ',
                infoText: '<strong>МНЕ 16 ЛЕТ</strong><br><br>Я являюсь начинающим разработчиком, имею канал в котором можно зарабатывать онлайн на написание отзывов.'
            },
            en: {
                name: 'rviax',
                title: 'Developer and Content Entrepreneur',
                bio: 'A beginner developer and content entrepreneur. My biography is on this website.',
                learnMore: 'LEARN MORE',
                aboutTitle: 'ABOUT ME',
                buttonText: 'MY TELEGRAM CHANNEL',
                infoText: '<strong>I AM 16 YEARS OLD</strong><br><br>I am a beginner developer, I have a channel where you can earn money online by writing reviews.'
            },
            jp: {
                name: 'rviax',
                title: '開発者兼コンテンツ起業家',
                bio: '初心者の開発者兼コンテンツ起業家。私の経歴はこのウェブサイトにあります。',
                learnMore: 'もっと詳しく',
                aboutTitle: '私について',
                buttonText: '私のテレグラムチャンネル',
                infoText: '<strong>16歳です</strong><br><br>私は初心者開発者で、レビューを書いてオンラインでお金を稼げるチャンネルを持っています。'
            }
        };
        
        let currentLang = 'ru';
        
        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            
            document.getElementById('name').textContent = t.name;
            document.getElementById('title').textContent = t.title;
            document.getElementById('bio').textContent = t.bio;
            document.getElementById('learnMore').textContent = t.learnMore;
            document.getElementById('aboutTitle').textContent = t.aboutTitle;
            document.getElementById('buttonText').textContent = t.buttonText;
            document.getElementById('infoText').innerHTML = t.infoText;
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.dataset.lang === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                setLanguage(btn.dataset.lang);
            });
        });
    </script>
</body>
</html>
