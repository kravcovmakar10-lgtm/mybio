<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Анимированный фон из Pinterest</title>
    <style>
        /* Сброс стилей */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden; /* Убираем полосы прокрутки */
            color: white;
        }

        /* --- Стили для видеофона --- */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Видео покрывает весь экран */
            z-index: -2;       /* Отправляем на задний план */
            pointer-events: none; /* Чтобы видео не мешало нажимать на кнопки */
        }
        
        /* Затемнение для лучшей читаемости текста и кнопки */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            z-index: -1;
        }

        /* Стили для контента */
        .content {
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 40px 30px;
            border-radius: 32px;
            max-width: 400px;
            width: 90%;
            z-index: 1;
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 20px;
        }

        button {
            background: #ffffff;
            color: #17212b;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        
        button:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <!-- ВАШЕ ВИДЕО ИЗ PINTEREST -->
    <!-- Прямая ссылка на .m3u8 файл (потоковое видео) -->
    <video class="video-background" autoplay muted loop playsinline>
        <source src="https://v1.pinimg.com/videos/iht/hls/06/5c/45/065c451bcdd034db58e488faffdd6a6a.m3u8" type="application/x-mpegURL">
        Ваш браузер не поддерживает видео.
    </video>
    
    <div class="overlay"></div>

    <div class="content">
        <h1>✨ Моё приложение ✨</h1>
        <button onclick="tg.showAlert('Видеофон работает! 🎉')">Нажми меня</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем приложение на весь экран
    </script>
</body>
</html>
